name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VM_PORT || 22 }} ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -p ${{ secrets.VM_PORT || 22 }} \
          ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'

            set -e

            echo "🚀 Pulling latest code..."
            cd lock-in-bot || exit 1

            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🔄 Restarting Service
            npm start

            echo "✅ Deployment complete!"
          EOF
